<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Subjective Illusion - Immersive View</title>
  
  <!-- Web App Meta Tags -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel for JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    /* スライダーのカスタマイズ */
    input[type=range]::-webkit-slider-thumb {
      width: 28px;
      height: 28px;
      background: #ffffff;
      cursor: pointer;
      border-radius: 50%;
      -webkit-appearance: none;
      border: 3px solid #f43f5e;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    }
    input[type=range] {
      -webkit-appearance: none;
      background: transparent;
      width: 100%;
    }
    input[type=range]:focus {
      outline: none;
    }
    /* コントロールパネルの透過エフェクト */
    .glass-effect {
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }
    /* タップハイライトの無効化 */
    * {
      -webkit-tap-highlight-color: transparent;
    }
    body, html, #root {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      overflow: hidden;
      background-color: white;
    }
    /* ノッチ対策 */
    .safe-area-bottom {
      padding-bottom: env(safe-area-inset-bottom);
    }
  </style>
</head>
<body class="font-sans">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- アイコン ---
    const Play = ({ className }) => (
      <svg viewBox="0 0 24 24" fill="currentColor" className={className}><path d="M8 5v14l11-7z"/></svg>
    );
    const Pause = ({ className }) => (
      <svg viewBox="0 0 24 24" fill="currentColor" className={className}><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
    );
    const Maximize = ({ className }) => (
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
    );
    const Minimize = ({ className }) => (
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M8 3v3a2 2 0 0 1-2 2H3m18 0h-3a2 2 0 0 1-2-2V3m0 18v-3a2 2 0 0 1 2-2h3M3 16h3a2 2 0 0 1 2 2v3"/></svg>
    );

    // --- 錯視図形 ---
    const Pacman = ({ x, y, rotation, radius }) => (
      <g transform={`translate(${x}, ${y}) rotate(${rotation})`}>
        <path 
          d={`M 0 0 L ${radius} 0 A ${radius} ${radius} 0 1 1 0 ${-radius} Z`} 
          fill="#0f172a" 
        />
      </g>
    );

    const SubjectiveSquare = ({ centerX, centerY, size, radius }) => {
      const half = size / 2;
      return (
        <g>
          <Pacman x={centerX - half} y={centerY - half} rotation={90} radius={radius} />
          <Pacman x={centerX + half} y={centerY - half} rotation={180} radius={radius} />
          <Pacman x={centerX + half} y={centerY + half} rotation={270} radius={radius} />
          <Pacman x={centerX - half} y={centerY + half} rotation={0} radius={radius} />
        </g>
      );
    };

    function App() {
      const [position, setPosition] = useState('left');
      const [isAutoPlaying, setIsAutoPlaying] = useState(true);
      const [intervalMs, setIntervalMs] = useState(120); 
      const [isImmersive, setIsImmersive] = useState(false);
      const [showControls, setShowControls] = useState(true);
      const isFirstRender = useRef(true);

      const playJumpSound = () => {
        const soundUrl = "https://raw.githubusercontent.com/kono3478/sozai/main/se_jump_001.wav";
        const audio = new Audio(soundUrl);
        audio.volume = 0.2;
        audio.play().catch(() => {});
      };

      const togglePosition = () => {
        setPosition(prev => (prev === 'left' ? 'right' : 'left'));
      };

      // UIを隠す・全画面を試みる
      const handleToggleImmersive = (e) => {
        e.stopPropagation();
        
        const nextState = !isImmersive;
        setIsImmersive(nextState);
        setShowControls(!nextState);

        // ブラウザが全画面APIをサポートしていれば実行（iOS iframe等ではスキップされる）
        if (nextState && document.fullscreenEnabled) {
          document.documentElement.requestFullscreen().catch(() => {
            // 失敗しても状態（UI非表示）は維持
          });
        } else if (!nextState && document.fullscreenElement) {
          document.exitFullscreen().catch(() => {});
        }
      };

      useEffect(() => {
        const handleFsChange = () => {
          const isFs = !!document.fullscreenElement;
          if (!isFs) {
            setIsImmersive(false);
            setShowControls(true);
          }
        };
        document.addEventListener('fullscreenchange', handleFsChange);
        return () => document.removeEventListener('fullscreenchange', handleFsChange);
      }, []);

      useEffect(() => {
        if (isFirstRender.current) {
          isFirstRender.current = false;
          return;
        }
        playJumpSound();
      }, [position]);

      useEffect(() => {
        let timer;
        if (isAutoPlaying) {
          timer = setInterval(togglePosition, intervalMs);
        }
        return () => clearInterval(timer);
      }, [isAutoPlaying, intervalMs]);

      const svgWidth = 400;
      const svgHeight = 300;
      const pacmanRadius = 32;
      const squareSize = 96;
      const centerY = 150;
      const centerX_left = 100;
      const centerX_right = 300;
      const currentX = position === 'left' ? centerX_left : centerX_right;

      return (
        <div className="relative h-full w-full flex flex-col overflow-hidden bg-white">
          
          {/* メイン描画エリア */}
          <div 
            className="absolute inset-0 z-0 flex items-center justify-center cursor-pointer"
            onClick={() => {
              if (showControls) {
                if (isAutoPlaying) setIsAutoPlaying(false);
                togglePosition();
              } else {
                // UIが隠れている時はタップで復帰
                setShowControls(true);
                setIsImmersive(false);
              }
            }}
          >
             <svg viewBox={`0 0 ${svgWidth} ${svgHeight}`} className="w-full h-full object-contain">
              <defs>
                <pattern id="dot-pattern" x="0" y="0" width="16" height="16" patternUnits="userSpaceOnUse">
                  <circle cx="8" cy="8" r="1.5" fill="#cbd5e1" />
                </pattern>
              </defs>
              <rect x="0" y="0" width="100%" height="100%" fill="url(#dot-pattern)" />
              <SubjectiveSquare 
                centerX={currentX} 
                centerY={centerY} 
                size={squareSize} 
                radius={pacmanRadius} 
              />
            </svg>
          </div>

          {/* 右上の通知 */}
          <div className="absolute top-6 right-6 z-10 flex flex-col items-end gap-2 pointer-events-none transition-opacity duration-500">
             {!isAutoPlaying && showControls && (
               <div className="text-slate-400 text-[10px] font-black uppercase tracking-widest border-2 border-slate-200 px-3 py-1 rounded-full bg-white/50 backdrop-blur-sm shadow-sm">
                 Manual Mode
               </div>
             )}
             {!showControls && (
               <div className="text-slate-300 text-[8px] font-bold uppercase tracking-widest bg-black/5 px-2 py-1 rounded animate-pulse backdrop-blur-sm">
                 Tap to exit immersive view
               </div>
             )}
          </div>

          {/* 下部コントロールパネル */}
          <div className={`absolute bottom-0 left-0 w-full z-20 glass-effect border-t border-slate-200/50 px-4 sm:px-8 py-4 safe-area-bottom shadow-[0_-10px_30px_rgba(0,0,0,0.05)] transition-transform duration-300 ${showControls ? 'translate-y-0' : 'translate-y-full'}`}>
            <div className="max-w-3xl mx-auto flex items-center gap-3 sm:gap-6">
              
              {/* 再生/停止ボタン */}
              <button 
                onClick={(e) => { e.stopPropagation(); setIsAutoPlaying(!isAutoPlaying); }}
                className={`flex-shrink-0 flex items-center justify-center w-12 h-12 sm:w-14 sm:h-14 rounded-2xl transition-all active:scale-90 shadow-lg ${
                  isAutoPlaying 
                    ? 'bg-rose-500 text-white shadow-rose-200' 
                    : 'bg-slate-800 text-white shadow-slate-300'
                }`}
              >
                {isAutoPlaying ? <Pause className="w-6 h-6 sm:w-7 sm:h-7" /> : <Play className="w-6 h-6 sm:w-7 sm:h-7 ml-1" />}
              </button>

              {/* スライダー */}
              <div className="flex-1 flex flex-col gap-1 min-w-0">
                <div className="flex justify-between items-center mb-1 px-1">
                  <span className="text-[9px] font-black text-slate-500 uppercase tracking-widest truncate">Animation Speed</span>
                  <div className="flex items-baseline gap-1 bg-white/60 px-2 rounded-md shrink-0">
                    <span className="text-sm font-mono font-black text-rose-500">{intervalMs}</span>
                    <span className="text-[8px] font-bold text-slate-400 uppercase">ms</span>
                  </div>
                </div>
                <div className="relative flex items-center h-6">
                  <div className="absolute w-full h-1.5 bg-slate-200 rounded-full"></div>
                  <div 
                    className="absolute h-1.5 bg-rose-500 rounded-full transition-all duration-150" 
                    style={{ width: `${((intervalMs - 10) / 240) * 100}%` }}
                  ></div>
                  <input 
                    type="range" 
                    min="10" 
                    max="250" 
                    step="10"
                    value={intervalMs}
                    onChange={(e) => setIntervalMs(Number(e.target.value))}
                    className="absolute w-full z-10 cursor-pointer"
                  />
                </div>
              </div>

              {/* 没入・UI隠しボタン */}
              <div className="flex flex-col gap-1 items-center shrink-0">
                <button 
                  onClick={handleToggleImmersive}
                  className={`flex items-center justify-center w-12 h-12 sm:w-14 sm:h-14 rounded-2xl bg-white border-2 border-slate-200 text-slate-600 transition-all active:scale-90 shadow-sm ${isImmersive ? 'border-rose-400 text-rose-500' : ''}`}
                >
                  {isImmersive ? <Minimize className="w-6 h-6" /> : <Maximize className="w-6 h-6" />}
                </button>
                <span className="text-[8px] font-bold text-slate-400 uppercase tracking-tighter">Immersive</span>
              </div>

            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
